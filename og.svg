<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="SecretTravel — The Concierge Quarterly · Issue 01">
  <defs>
    <path id="topArc" d="M 600 315 m -300 0 a 300 300 0 0 1 600 0" fill="none"/>
    <path id="bottomArc" d="M 600 315 m -300 0 a 300 300 0 0 0 600 0" fill="none"/>
    <style>
      .ink { fill: oklch(92% 0.010 80); }
      .ink-dim { fill: oklch(92% 0.010 80); fill-opacity: 0.6; }
      .ox { fill: oklch(58% 0.19 25); }
      .ox-stroke { stroke: oklch(58% 0.19 25); fill: none; }
      .serif-it { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; font-style: italic; font-weight: 300; }
      .mono-up { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="oklch(11% 0.018 270)"/>

  <g transform="translate(600 315)">
    <circle r="258" class="ox-stroke" stroke-width="1" stroke-dasharray="3 6" stroke-opacity="0.25"/>
    <circle r="240" class="ox-stroke" stroke-width="2"/>
    <circle r="226" class="ox-stroke" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <text class="ox mono-up" font-size="16" letter-spacing="5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">SECRETTRAVEL · CONCIERGE BOOKING SOCIETY</textPath>
  </text>
  <text class="ox mono-up" font-size="16" letter-spacing="5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EST. 2019 · WORLDWIDE · CRYPTO-SETTLED · APPROVED</textPath>
  </text>

  <g transform="translate(600 315)" text-anchor="middle">
    <text class="ox serif-it" font-size="56" y="-78">✦</text>
    <text class="ox serif-it" font-size="140" y="48" letter-spacing="-4">S T</text>
    <line x1="-40" y1="76" x2="40" y2="76" stroke="oklch(58% 0.19 25)" stroke-width="1"/>
    <text class="ink mono-up" font-size="14" y="106" letter-spacing="4">APPROVED</text>
  </g>

  <line x1="120" y1="568" x2="1080" y2="568" stroke="oklch(92% 0.010 80)" stroke-opacity="0.18" stroke-width="1"/>
  <text x="600" y="600" text-anchor="middle" class="ink-dim mono-up" font-size="22" letter-spacing="6">BOOKING · FLIGHTS · TOURS · USDT · BTC</text>
